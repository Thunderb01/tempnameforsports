<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Set New Password — Beyond the Portal</title>
    <link rel="stylesheet" href="./styles.css" />
    <style>
      .login-wrap { min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px; }
      .login-card { width:100%;max-width:420px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:40px 36px 36px; }
      .login-logo { display:flex;align-items:center;gap:10px;margin-bottom:32px; }
      .login-logo img { height:36px;width:36px;border-radius:6px;object-fit:cover; }
      .login-logo span { font-size:15px;font-weight:500;opacity:.85; }
      h1 { font-size:22px;font-weight:500;margin:0 0 6px; }
      .subtitle { font-size:14px;opacity:.5;margin:0 0 28px;line-height:1.5; }
      .login-field { display:flex;flex-direction:column;gap:6px;margin-bottom:14px; }
      .login-field label { font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;opacity:.45; }
      .login-field input { width:100%;box-sizing:border-box;padding:10px 12px;font-size:15px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:8px;color:inherit;outline:none;transition:border-color .15s; }
      .login-field input:focus { border-color:rgba(255,255,255,0.4); }
      .login-field input.field-error { border-color:rgba(220,70,70,0.7); }
      .login-error { font-size:13px;color:#e55;min-height:18px;margin-bottom:14px; }
      .login-btn { width:100%;padding:12px;font-size:15px;font-weight:500;border-radius:8px;cursor:pointer;border:none;background:rgba(255,255,255,0.92);color:#111;transition:opacity .15s;margin-bottom:14px; }
      .login-btn:hover { opacity:.88; } .login-btn:disabled { opacity:.38;cursor:default; }
      .success { font-size:14px;color:rgba(80,200,120,0.9);line-height:1.5; }
    </style>
  </head>
  <body>
    <div class="login-wrap">
      <div class="login-card">
        <div class="login-logo">
          <img src="./imgs/beyond_the_portal_logo.jpg" alt="Beyond the Portal" />
          <span>Beyond the Portal</span>
        </div>

        <div id="formView">
          <h1>Set new password</h1>
          <p class="subtitle">Choose a new password for your account.</p>

          <div class="login-field">
            <label for="newPassword">New password</label>
            <input id="newPassword" type="password" placeholder="At least 8 characters"
                   autocomplete="new-password" />
          </div>
          <div class="login-field">
            <label for="confirmPassword">Confirm password</label>
            <input id="confirmPassword" type="password" placeholder="••••••••"
                   autocomplete="new-password" />
          </div>

          <div class="login-error" id="formError"></div>
          <button class="login-btn" id="submitBtn" type="button">Set password</button>
        </div>

        <div id="successView" hidden>
          <h1>Password updated</h1>
          <p class="success">Your password has been set. Redirecting you to sign in…</p>
        </div>
      </div>
    </div>

    <script type="module">
      import { supabase } from "./auth.js";

      const formView       = document.getElementById("formView");
      const successView    = document.getElementById("successView");
      const newPassword    = document.getElementById("newPassword");
      const confirmPassword = document.getElementById("confirmPassword");
      const submitBtn      = document.getElementById("submitBtn");
      const formError      = document.getElementById("formError");

      // Supabase puts the recovery token in the URL hash — the JS client
      // picks it up automatically when the page loads.
      supabase.auth.onAuthStateChange(async (event) => {
        if (event === "PASSWORD_RECOVERY") {
          // User is now in password-recovery state — show the form
          formView.hidden = false;
        }
      });

      async function handleSubmit() {
        formError.textContent = "";
        newPassword.classList.remove("field-error");
        confirmPassword.classList.remove("field-error");

        const pw1 = newPassword.value;
        const pw2 = confirmPassword.value;

        if (pw1.length < 8) {
          formError.textContent = "Password must be at least 8 characters.";
          newPassword.classList.add("field-error");
          return;
        }
        if (pw1 !== pw2) {
          formError.textContent = "Passwords don't match.";
          confirmPassword.classList.add("field-error");
          return;
        }

        submitBtn.disabled    = true;
        submitBtn.textContent = "Saving…";

        const { error } = await supabase.auth.updateUser({ password: pw1 });
        if (error) {
          formError.textContent = error.message;
          submitBtn.disabled    = false;
          submitBtn.textContent = "Set password";
          return;
        }

        formView.hidden    = true;
        successView.hidden = false;
        setTimeout(() => { window.location.href = "./login.html"; }, 2500);
      }

      submitBtn.addEventListener("click", handleSubmit);
      confirmPassword.addEventListener("keydown", e => { if (e.key === "Enter") handleSubmit(); });
    </script>
  </body>
</html>
