<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Full Board — Beyond the Portal</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="page-board">
  <style>
    /* ── Board page layout ── */
    .page-board {
      min-height: 100dvh;
      height: 100dvh;
      max-height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .page-board .site-header-wrap { flex: 0 0 auto; }
    .page-board main.section {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding-top: 18px;
      padding-bottom: 18px;
    }
    .page-board h1 { flex: 0 0 auto; }
    .page-board .settings { flex: 0 0 auto; grid-template-columns: repeat(5, 1fr); }
    @media (max-width: 900px) { .page-board .settings { grid-template-columns: 1fr 1fr; } }
    .page-board .board-panel {
      flex: 1 1 auto;
      min-height: 0;
      margin-top: 14px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: auto;
    }
    .page-board .board-panel table {
      min-width: 900px;
    }
  </style>
  <div class="site-header-wrap">
    <header class="site-header">
      <a class="brand" href="./index.html" aria-label="Beyond the Portal home">
        <img class="brand-logo" src="./imgs/beyond_the_portal_logo.jpg" alt="Beyond the Portal" />
        <span class="brand-name">Beyond the Portal</span>
      </a>

      <nav class="nav" id="mainNav">
        <!-- Tools dropdown -->
        <div class="nav-dropdown" id="toolsDropdown">
          <button class="nav-dropdown-btn" id="toolsBtn" type="button" aria-haspopup="true" aria-expanded="false">
            Tools
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="4 6 8 10 12 6"/>
            </svg>
          </button>
          <div class="nav-dropdown-menu" id="toolsMenu" role="menu">
            <a href="./app.html" role="menuitem" class="">
              <span class="menu-icon">🏀</span> Roster Builder
            </a>
            <a href="./board.html" role="menuitem" class="nav-active">
              <span class="menu-icon">📋</span> Full Board
            </a>
            <a href="./role_prioritization.html" role="menuitem" class="">
              <span class="menu-icon">🎯</span> Role Prioritization
            </a>
          </div>
        </div>

        <a href="./index.html" class="">About</a>
        
      </nav>
    </header>
  </div>

    <main class="section">
      <div style="display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:14px;">
        <h1 style="margin:0;">Full Board</h1>
        <button class="btn btn-ghost" id="viewToggle" type="button">Table View</button>
      </div>

      <div class="settings" style="grid-template-columns: 2fr 1fr 1fr 1fr 1fr; align-items:end;">
        <div class="setting">
          <label>Search</label>
          <input id="search" type="search" placeholder="Name, team, tag…" />
        </div>

        <div class="setting">
          <label>Position</label>
          <select id="posFilter">
            <option value="all">All positions</option>
            <option value="Guard">Guard</option>
            <option value="Wing">Wing</option>
            <option value="Big">Big</option>
          </select>
        </div>

        <div class="setting">
          <label>Year</label>
          <select id="yearFilter">
            <option value="all">All years</option>
          </select>
        </div>

        <div class="setting">
          <label>Tag type</label>
          <select id="tagGroup">
            <option value="all">All tag types</option>
            <option value="playmaker">Play Maker</option>
            <option value="shooting">Shooting &amp; Scoring</option>
          </select>
        </div>

        <div class="setting">
          <label>Tag</label>
          <select id="tagFilter">
            <option value="all">All tags</option>
          </select>
        </div>

        <div class="setting setting-wide" style="display:flex;align-items:center;justify-content:space-between;gap:12px;">
          <div id="meta" class="muted"></div>
          <button class="btn btn-ghost" id="reloadBtn" type="button">Reload</button>
        </div>
      </div>

      <div class="board-panel">
        <div id="tableWrap" style="display:flex;flex-direction:column;gap:10px;padding:8px 0;"></div>
      </div>
    </main>

    <!-- Player Modal -->
    <div class="modal-backdrop" id="playerModalBackdrop" hidden></div>
    <div class="modal" id="playerModal" role="dialog" aria-modal="true" aria-labelledby="playerModalTitle" hidden>
      <div class="modal-card">
        <div class="modal-head">
          <div>
            <div class="modal-kicker" id="playerModalKicker">Player</div>
            <h3 class="modal-title" id="playerModalTitle">Player Name</h3>
            <div class="modal-sub" id="playerModalSub">Team • Pos • Year</div>
            <div class="modal-id" id="playerModalId"></div>
          </div>
          <button class="btn btn-ghost" id="playerModalCloseBtn" type="button" aria-label="Close">Close</button>
        </div>
        <div class="modal-body">
          <div class="modal-grid" id="playerModalStats"></div>
          <div class="modal-section">
            <h4>Market Band</h4>
            <div class="modal-sub" id="playerModalMarket"></div>
          </div>
          <div class="modal-section">
            <h4>Tags</h4>
            <div id="playerModalStatus"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- SheetJS (XLSX parser) -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script type="module" src="./board.js"></script>
  
  <script>
    /* ── nav dropdown ── */
    (function(){
      var dd = document.getElementById('toolsDropdown');
      var btn = document.getElementById('toolsBtn');
      if(!dd||!btn) return;
      btn.addEventListener('click', function(e){
        e.stopPropagation();
        dd.classList.toggle('open');
        btn.setAttribute('aria-expanded', dd.classList.contains('open'));
      });
      document.addEventListener('click', function(){ dd.classList.remove('open'); btn.setAttribute('aria-expanded','false'); });
      dd.addEventListener('click', function(e){ e.stopPropagation(); });
    })();
  </script>
</body>
</html>
